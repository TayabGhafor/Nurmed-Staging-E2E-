name: E2E Tests (Scheduled)

# ─── Trigger ────────────────────────────────────────────────────────────────
# Runs every 30 minutes and on manual dispatch.
# Also runs on pushes to main that touch test files.
on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - login
          - session
          - validation
          - e2e
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-tests.yml'

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: read
  actions: read

# ─── Concurrency ────────────────────────────────────────────────────────────
# Prevent overlapping runs (e.g., if a run takes > 30 min)
concurrency:
  group: e2e-tests
  cancel-in-progress: false

# ─── Environment ────────────────────────────────────────────────────────────
env:
  STG_API_URL: https://stg-api.nurmed.ai/api/v1
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # API + Data Validation tests (no browser needed)
  # ═══════════════════════════════════════════════════════════════════════════
  api-tests:
    name: API & Data Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (no browsers needed for API tests)
        run: pnpm exec playwright install --with-deps chromium

      # ── Run login API tests ──────────────────────────────────────────
      - name: Run Login API Tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          STG_API_URL: ${{ env.STG_API_URL }}
        run: |
          pnpm exec playwright test --project=api tests/api/login.spec.ts \
            --reporter=list

      # ── Run session lifecycle API tests ──────────────────────────────
      - name: Run Session Lifecycle Tests
        if: ${{ github.event.inputs.test_suite != 'login' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          STG_API_URL: ${{ env.STG_API_URL }}
          SESSION_TEMPLATE: ${{ secrets.SESSION_TEMPLATE || 'OPDLHR18' }}
        run: |
          pnpm exec playwright test --project=api tests/api/session-lifecycle.spec.ts \
            --reporter=list

      # ── Run data validation tests ───────────────────────────────────
      - name: Run Data Validation Tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'validation' || github.event_name == 'schedule' || github.event_name == 'push' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          STG_API_URL: ${{ env.STG_API_URL }}
          SESSION_TEMPLATE: ${{ secrets.SESSION_TEMPLATE || 'OPDLHR18' }}
        run: |
          pnpm exec playwright test --project=data-validation \
            --reporter=list

      # ── Run E2E UI tests ────────────────────────────────────────────
      - name: Run E2E UI Tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'e2e' || github.event_name == 'schedule' || github.event_name == 'push' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          STG_API_URL: ${{ env.STG_API_URL }}
        run: |
          pnpm exec playwright test --project=e2e \
            --reporter=list

      # ── Upload test results ─────────────────────────────────────────
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results.json
          retention-days: 30

      - name: Upload Session Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: session-reports-${{ github.run_number }}
          path: testResults/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # Failure notification
  # ═══════════════════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [api-tests]
    if: failure()

    steps:
      # ── Slack notification ──────────────────────────────────────────
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 NurMed E2E Tests Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n#${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # ── Summary ─────────────────────────────────────────────────────
      - name: Create failure summary
        run: |
          {
            echo "## 🚨 E2E Tests Failed"
            echo ""
            echo "- **Workflow**: ${{ github.workflow }}"
            echo "- **Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- **Trigger**: \`${{ github.event_name }}\`"
            echo "- **Branch**: \`${{ github.ref_name }}\`"
            echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # Success notification (optional — only logs)
  # ═══════════════════════════════════════════════════════════════════════════
  notify-success:
    name: Log Success
    runs-on: ubuntu-latest
    needs: [api-tests]
    if: success()

    steps:
      - name: Create success summary
        run: |
          {
            echo "## ✅ E2E Tests Passed"
            echo ""
            echo "- **Workflow**: ${{ github.workflow }}"
            echo "- **Run**: #${{ github.run_number }}"
            echo "- **Trigger**: \`${{ github.event_name }}\`"
            echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
